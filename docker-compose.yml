version: '3.8'

services:
  # ── Reverse Proxy (The Gateway) ──
  nginx:
    image: nginx:1.25-alpine
    container_name: foodrush_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - foodrush_net

  # ── Database ──
  db:
    image: postgres:16-alpine
    container_name: foodrush_db
    environment:
      POSTGRES_DB: foodrush_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - foodrush_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d foodrush_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend ──
  backend:
    build: ./backend
    container_name: foodrush_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=foodrush_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_SSL=false
      - JWT_SECRET=secret_key
      - FRONTEND_URL=http://localhost
    networks:
      - foodrush_net
    # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost/api
    container_name: foodrush_frontend
    depends_on:
      - backend
    networks:
      - foodrush_net

networks:
  foodrush_net:
    driver: bridge

volumes:
  postgres_data:
