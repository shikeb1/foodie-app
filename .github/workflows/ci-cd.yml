name: FoodRush DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/foodrush

jobs:
  # ── 1. Security Scan: Secrets & Linting ───────────────────────────────────
  security-scan:
    name: 🛡️ Security & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3018 # Allow alpine apk without version for simplicity in this project

  # ── 2. Backend: Test & SCA ────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend (Test & SCA)
    runs-on: ubuntu-latest
    needs: [security-scan]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: foodrush_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies & Audit
        working-directory: backend
        run: |
          npm install
          npm audit --audit-level=high

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: foodrush_test
          DB_USER: postgres
          DB_PASSWORD: password
          JWT_SECRET: test_jwt_secret
        run: npm test -- --passWithNoTests

  # ── 3. Frontend: Build & SCA ──────────────────────────────────────────────
  test-frontend:
    name: 🎨 Frontend (Build & SCA)
    runs-on: ubuntu-latest
    needs: [security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies & Audit
        working-directory: frontend
        run: |
          npm install
          npm audit --audit-level=high

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:5000/api
          CI: false
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 7

  # ── 4. Build, Scan & Push Docker Images ───────────────────────────────────
  build-and-push:
    name: 🐳 Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Backend Build & Scan ---
      - name: Build Backend (Local Only)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          load: true
          tags: foodie-backend:latest

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'foodie-backend:latest'
          format: 'table'
          exit-code: '1' # Fail the build if critical vulnerabilities found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Image
        run: |
          docker tag foodie-backend:latest ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest

      # --- Frontend Build & Scan ---
      - name: Build Frontend (Local Only)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          load: true
          tags: foodie-frontend:latest
          build-args: |
             REACT_APP_API_URL=${{ vars.REACT_APP_API_URL }}

      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'foodie-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend Image
        run: |
          docker tag foodie-frontend:latest ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

  # ── 5. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Secure Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/foodrush
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Secure Deployment complete!"
