name: FoodRush 9-Step DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/foodrush

jobs:
  devsecops-pipeline:
    name: 🛡️ End-to-End DevSecOps
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      # --- Step 1: Checkout ---
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Step 2: Secrets Scan ---
      - name: 2. Secrets Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Step 3: Setup Env ---
      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # --- Step 4: Backend Security Audit ---
      - name: 4. Backend Install & Audit
        working-directory: backend
        run: |
          npm install
          npm audit --audit-level=high

      # --- Step 5: Backend Tests ---
      - name: 5. Run Backend Tests
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: foodrush_test
          DB_USER: postgres
          DB_PASSWORD: password
          JWT_SECRET: test_jwt_secret
        run: npm test -- --passWithNoTests

      # --- Step 6: Frontend Security Audit ---
      - name: 6. Frontend Install & Audit
        working-directory: frontend
        run: |
          npm install
          # Note: frontend often has legacy audit issues in react-scripts.
          # We scan but continue if they are below 'critical' level.
          npm audit --audit-level=critical

      # --- Step 7: Frontend Build ---
      - name: 7. Build Frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:5000/api
          CI: false
        run: npm run build

      # --- Step 8: Build & Scan Container ---
      - name: 8. Build & Scan Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          load: true
          tags: foodie-backend:latest

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'foodie-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # --- Step 9: Push & Deploy ---
      - name: 9. Push & Secure Deploy
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker tag foodie-backend:latest ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Secure SSH Deploy
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/foodrush
            docker compose pull
            docker compose up -d
            echo "✅ Secure Deployment complete!"
